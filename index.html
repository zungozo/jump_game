<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Jump - Booster Edition</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a2e;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            touch-action: none; /* 브라우저 기본 터치 동작 방지 */
        }
        #game-container {
            position: relative;
        }
        canvas { 
            background: linear-gradient(to bottom, #16213e, #0f3460); 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
        }
        /* 모드 선택 화면 스타일 */
        #mode-selection {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 12px;
            color: white;
        }
        .mode-btn {
            padding: 15px 40px;
            margin: 10px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #4ecdc4;
            color: #1a1a2e;
            font-weight: bold;
            transition: 0.2s;
        }
        .mode-btn:hover { background: #fed330; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="650"></canvas>
        <div id="mode-selection">
            <h1>Infinity Jump</h1>
            <p>조작 모드를 선택하세요</p>
            <button class="mode-btn" onclick="selectMode('pc')">PC (방향키)</button>
            <button class="mode-btn" onclick="selectMode('mobile')">Mobile (조이스틱)</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
