<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Jump - Booster Edition</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a2e; /* 딥 네이비 배경 */
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }
        canvas { 
            background: linear-gradient(to bottom, #16213e, #0f3460); /* 그라데이션 배경 */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="650"></canvas>
    <script src="game.js"></script>
</body>
</html>
