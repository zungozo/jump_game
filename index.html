<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Jump - Booster Edition</title>
    <style>
        body { 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background: #1a1a2e; font-family: 'Pretendard', sans-serif;
            overflow: hidden; touch-action: none;
        }
        #game-container { position: relative; user-select: none; -webkit-user-select: none; }
        canvas { 
            background: linear-gradient(to bottom, #16213e, #0f3460); 
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: block;
        }

        /* 모드 선택 화면 */
        #mode-selection {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 30; border-radius: 12px; color: white;
        }
        .mode-btn {
            padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer;
            border: none; border-radius: 8px; background: #4ecdc4; color: #1a1a2e;
            font-weight: bold; transition: 0.2s;
        }

        /* 🔥 진짜 버튼 UI */
        #mobile-controls {
            position: absolute; bottom: 30px; width: 100%; height: 120px;
            display: none; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; z-index: 20; pointer-events: none;
        }
        .btn {
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.4); border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 40px; font-weight: bold;
            pointer-events: auto; /* 버튼만 터치 가능하게 */
            backdrop-filter: blur(5px);
        }
        /* 버튼 눌렀을 때 효과 */
        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="650"></canvas>
        
        <div id="mobile-controls">
            <div id="btn-left" class="btn">◀</div>
            <div id="btn-right" class="btn">▶</div>
        </div>

        <div id="mode-selection">
            <h1>Infinity Jump</h1>
            <button class="mode-btn" onclick="selectMode('pc')">PC (Keyboard)</button>
            <button class="mode-btn" onclick="selectMode('mobile')">Mobile (Button)</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
